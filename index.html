<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🏭 Factory Evidence Pro - PH</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/mobile.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>🏭 Factory Evidence Pro</h1>
            <p class="subtitle">🇵🇭 Philippines Timezone</p>
            <div id="phTimeDisplay" class="ph-time">Loading PH time...</div>
        </header>

        <main>
            <form id="evidenceForm">
                <!-- Dates -->
                <section class="form-section">
                    <div class="date-row">
                        <div class="form-group">
                            <label for="fclDate">FCL Date <span class="required">*</span></label>
                            <input type="date" id="fclDate" required>
                        </div>
                        <div class="form-group">
                            <label for="chinaDate">China Date <span class="required">*</span></label>
                            <input type="date" id="chinaDate" required>
                        </div>
                    </div>
                    <p class="hint">📅 Dates are in Philippines time (UTC+8)</p>
                </section>

                <!-- Form Fields -->
                <section class="form-section">
                    <div class="form-group">
                        <label for="sku">SKU Number <span class="required">*</span></label>
                        <input type="text" id="sku" placeholder="e.g., ABC123" required>
                    </div>
                    <div class="form-group">
                        <label for="boxCode">Box Code <span class="required">*</span></label>
                        <input type="text" id="boxCode" placeholder="e.g., BOX001" required>
                    </div>
                    <div class="form-group">
                        <label for="quantity">Quantity <span class="required">*</span></label>
                        <input type="number" id="quantity" min="1" placeholder="Number of items" required>
                    </div>
                    <div class="form-group">
                        <label for="remarks">Remarks</label>
                        <textarea id="remarks" placeholder="Optional notes about issues/damage"></textarea>
                    </div>
                </section>

                <!-- Media Section -->
                <section class="media-section">
                    <div class="media-header">
                        <h3>📎 Media Evidence</h3>
                        <span class="media-counter" id="mediaCounter">0 items</span>
                    </div>

                    <!-- Camera Preview -->
                    <video id="cameraPreview" autoplay muted playsinline></video>

                    <!-- Controls -->
                    <div class="media-controls">
                        <button type="button" id="cameraBtn" class="btn-primary">📷 Camera</button>
                        <button type="button" id="recordBtn">🎥 Record</button>
                        <button type="button" id="uploadBtn">⬆️ Upload</button>
                        <button type="button" id="clearMediaBtn" class="btn-danger">🗑️ Clear</button>
                    </div>

                    <!-- Camera Actions -->
                    <div id="cameraActions" style="display:none;">
                        <button type="button" id="capturePhotoBtn" class="btn-primary">📸 Capture</button>
                        <button type="button" id="stopCameraBtn">⏹ Stop</button>
                    </div>

                    <!-- Recording Actions -->
                    <div id="recordingActions" style="display:none;">
                        <button type="button" id="startRecordBtn" class="btn-danger">🔴 Start Recording</button>
                        <button type="button" id="stopRecordBtn">⏹ Stop</button>
                    </div>

                    <!-- Hidden file input -->
                    <input type="file" id="fileInput" class="hidden" accept="image/*,video/*" multiple>

                    <!-- Media Gallery -->
                    <div id="mediaGallery" class="media-grid"></div>

                    <p class="hint">📸 Multiple images • 🎥 Up to 1 video (100MB max) • 🇵🇭 PH Time</p>
                </section>

                <!-- Submit -->
                <div class="submit-area">
                    <button type="submit" id="submitBtn" class="btn-submit">📤 Submit Evidence</button>
                </div>
            </form>

            <!-- Status Messages -->
            <div id="statusMessage" class="status-message"></div>
        </main>
    </div>

    <script src="config/config.js"></script>
    <script src="js/validation.js"></script>
    <script src="js/media.js"></script>
    <script src="js/camera.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
